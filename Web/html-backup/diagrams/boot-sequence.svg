<svg viewBox="0 0 640 960" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:640px;display:block;margin:0 auto;cursor:default;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1D6A72"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4A3B8C"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666666"/>
    </marker>
    <style>
      .clickable { cursor:pointer; }
      .clickable:hover rect, .clickable:hover path { filter:brightness(0.93); }
    </style>
  </defs>

  <!-- ── BOOT SEQUENCE ── -->
  <text x="320" y="20" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#666666">Boot sequence (runs once)</text>
  <line x1="20" y1="26" x2="620" y2="26" stroke="#CCCCCC" stroke-width="0.75"/>

  <g class="clickable" data-node="main">
    <rect x="20" y="38" width="110" height="44" rx="7" fill="#E1F5EE" stroke="#1D6A72" stroke-width="1.5"/>
    <text x="75" y="56" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#1D6A72">Main.java</text>
    <text x="75" y="72" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="9" fill="#444444">startRobot()</text>
  </g>

  <g class="clickable" data-node="robot">
    <rect x="165" y="38" width="110" height="44" rx="7" fill="#E1F5EE" stroke="#1D6A72" stroke-width="1.5"/>
    <text x="220" y="56" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#1D6A72">Robot.java</text>
    <text x="220" y="72" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="9" fill="#444444">constructor</text>
  </g>

  <g class="clickable" data-node="robotcontainer">
    <rect x="310" y="38" width="140" height="44" rx="7" fill="#EEEDFE" stroke="#4A3B8C" stroke-width="1.5"/>
    <text x="380" y="56" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#4A3B8C">RobotContainer</text>
    <text x="380" y="72" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="9" fill="#444444">subsystems + bindings</text>
  </g>

  <g class="clickable" data-node="constants">
    <rect x="485" y="38" width="120" height="44" rx="7" fill="#FEF3E2" stroke="#92600A" stroke-width="1.5"/>
    <text x="545" y="56" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#92600A">Constants.java</text>
    <text x="545" y="72" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="9" fill="#444444">values read</text>
  </g>

  <line x1="130" y1="60" x2="163" y2="60" stroke="#1D6A72" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="275" y1="60" x2="308" y2="60" stroke="#1D6A72" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="60" x2="483" y2="60" stroke="#1D6A72" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="82" x2="220" y2="116" stroke="#1D6A72" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="238" y="105" font-family="'Segoe UI',sans-serif" font-size="10" fill="#666666">then loops forever ↓</text>

  <!-- ── 20ms LOOP ── -->
  <rect x="20" y="124" width="600" height="174" rx="10" fill="#E1F5EE" stroke="#1D6A72" stroke-width="1.5"/>
  <text x="320" y="147" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#1D6A72">Every 20ms: robotPeriodic()</text>

  <g class="clickable" data-node="inputs">
    <rect x="38" y="158" width="272" height="46" rx="6" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
    <text x="154" y="176" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#444444">1. IO inputs captured</text>
    <text x="154" y="192" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="8.5" fill="#666666">Logger.processInputs() per subsystem</text>
  </g>
  <rect x="268" y="160" width="34" height="14" rx="7" fill="#085041"/>
  <text x="285" y="171" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#9FE1CB">AKit</text>

  <g class="clickable" data-node="scheduler">
    <rect x="330" y="158" width="272" height="46" rx="6" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
    <text x="466" y="176" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#444444">2. CommandScheduler.run()</text>
    <text x="466" y="192" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="8.5" fill="#666666">subsystem.periodic() + active commands</text>
  </g>

  <g class="clickable" data-node="outputs">
    <rect x="38" y="216" width="272" height="46" rx="6" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
    <text x="154" y="234" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#444444">3. Outputs applied to hardware</text>
    <text x="154" y="250" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="8.5" fill="#666666">IO layer writes volts to motors/servos</text>
  </g>
  <rect x="268" y="218" width="34" height="14" rx="7" fill="#085041"/>
  <text x="285" y="229" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#9FE1CB">AKit</text>

  <g class="clickable" data-node="telemetry">
    <rect x="330" y="216" width="272" height="46" rx="6" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
    <text x="466" y="234" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#444444">4. Telemetry recorded</text>
    <text x="466" y="250" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="8.5" fill="#666666">Logger.recordOutput() → log / NetworkTables</text>
  </g>
  <rect x="564" y="218" width="34" height="14" rx="7" fill="#085041"/>
  <text x="581" y="229" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#9FE1CB">AKit</text>

  <path d="M20 270 Q4 270 4 224 Q4 158 20 158" fill="none" stroke="#1D6A72" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ── MODE BRANCH ── -->
  <line x1="320" y1="298" x2="320" y2="334" stroke="#666666" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <text x="420" y="322" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#666666">Robot mode (set by Driver Station)</text>

  <rect x="20" y="342" width="600" height="130" rx="10" fill="#F4F4F4" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="6,4"/>

  <g class="clickable" data-node="disabled">
    <rect x="36" y="356" width="172" height="100" rx="7" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
    <text x="122" y="377" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#444444">Disabled</text>
    <text x="122" y="394" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666666">Scheduler still runs</text>
    <text x="122" y="409" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666666">No commands execute</text>
    <text x="122" y="424" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666666">Outputs zeroed</text>
  </g>

  <g class="clickable" data-node="teleop">
    <rect x="234" y="356" width="172" height="100" rx="7" fill="#EEEDFE" stroke="#4A3B8C" stroke-width="1.5"/>
    <text x="320" y="377" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#4A3B8C">Teleop</text>
    <text x="320" y="394" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#4A3B8C">Controller bindings active</text>
    <text x="320" y="409" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#4A3B8C">Default commands run</text>
    <text x="320" y="424" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#4A3B8C">Driver controls robot</text>
  </g>

  <g class="clickable" data-node="auto">
    <rect x="432" y="356" width="172" height="100" rx="7" fill="#E1F5EE" stroke="#1D6A72" stroke-width="1.5"/>
    <text x="518" y="377" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#1D6A72">Autonomous</text>
    <text x="518" y="394" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#1D6A72">Auto command scheduled</text>
    <text x="518" y="409" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#1D6A72">No controller input</text>
    <text x="518" y="424" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#1D6A72">Runs fixed routine</text>
  </g>

  <!-- ── ROBOTCONTAINER DETAIL ── -->
  <line x1="320" y1="472" x2="320" y2="508" stroke="#666666" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <text x="440" y="495" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#666666">Inside RobotContainer (runs once at boot)</text>

  <rect x="20" y="516" width="600" height="406" rx="10" fill="#F4F4F4" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="320" y1="532" x2="320" y2="908" stroke="#CCCCCC" stroke-width="0.75" stroke-dasharray="4,3"/>
  <text x="170" y="542" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#1D6A72" letter-spacing="0.08em">SUBSYSTEMS</text>

  <g class="clickable" data-node="subsystems-created">
    <rect x="36" y="550" width="268" height="46" rx="6" fill="#E1F5EE" stroke="#1D6A72" stroke-width="1"/>
    <text x="170" y="568" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#1D6A72">Subsystems created</text>
    <text x="170" y="584" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="8.5" fill="#444444">new DriveSubsystem(new DriveIOXRP())</text>
  </g>

  <g class="clickable" data-node="io-injected">
    <rect x="36" y="608" width="268" height="46" rx="6" fill="#E1F5EE" stroke="#1D6A72" stroke-width="1"/>
    <text x="170" y="626" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#1D6A72">IO layer injected</text>
    <text x="170" y="642" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#444444">Subsystem receives IO implementation</text>
  </g>

  <g class="clickable" data-node="default-commands">
    <rect x="36" y="666" width="268" height="46" rx="6" fill="#E1F5EE" stroke="#1D6A72" stroke-width="1"/>
    <text x="170" y="684" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#1D6A72">Default commands set</text>
    <text x="170" y="700" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="8.5" fill="#444444">drive.setDefaultCommand(arcadeDrive)</text>
  </g>

  <text x="470" y="542" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#4A3B8C" letter-spacing="0.08em">BINDINGS</text>

  <g class="clickable" data-node="configure-bindings">
    <rect x="336" y="550" width="268" height="46" rx="6" fill="#EEEDFE" stroke="#4A3B8C" stroke-width="1"/>
    <text x="470" y="568" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#4A3B8C">configureBindings()</text>
    <text x="470" y="584" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#4A3B8C">Maps buttons to commands</text>
  </g>

  <line x1="470" y1="596" x2="470" y2="606" stroke="#4A3B8C" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <g class="clickable" data-node="button-binding">
    <rect x="336" y="608" width="268" height="46" rx="6" fill="#FFFFFF" stroke="#AFA9EC" stroke-width="1"/>
    <text x="470" y="626" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#444444">Button A → command</text>
    <text x="470" y="642" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="8.5" fill="#666666">whileTrue(new ArmCommand(arm))</text>
  </g>

  <g class="clickable" data-node="trigger-binding">
    <rect x="336" y="666" width="268" height="46" rx="6" fill="#FFFFFF" stroke="#AFA9EC" stroke-width="1"/>
    <text x="470" y="684" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#444444">Trigger condition → command</text>
    <text x="470" y="700" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="8.5" fill="#666666">onTrue(new ElevatorCommand(elev))</text>
  </g>

  <g class="clickable" data-node="scheduler-view">
    <rect x="36" y="728" width="568" height="168" rx="8" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.75"/>
    <text x="320" y="748" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666666">What the scheduler sees after boot</text>
    <rect x="52" y="758" width="168" height="46" rx="6" fill="#F4F4F4" stroke="#CCCCCC" stroke-width="1"/>
    <text x="136" y="776" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#444444">Subsystem A</text>
    <text x="136" y="792" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666666">default: ArcadeDrive</text>
    <rect x="236" y="758" width="168" height="46" rx="6" fill="#F4F4F4" stroke="#CCCCCC" stroke-width="1"/>
    <text x="320" y="776" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#444444">Subsystem B</text>
    <text x="320" y="792" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666666">default: none</text>
    <rect x="420" y="758" width="168" height="46" rx="6" fill="#F4F4F4" stroke="#CCCCCC" stroke-width="1"/>
    <text x="504" y="776" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#444444">Subsystem C</text>
    <text x="504" y="792" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666666">default: none</text>
    <text x="320" y="826" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666666">When a button command ends → default command resumes</text>
    <text x="320" y="844" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666666">Commands declare requirements via addRequirements()</text>
  </g>
</svg>
