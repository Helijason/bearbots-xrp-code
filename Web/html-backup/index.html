<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title><!-- populated by frc-curriculum.js from SITE_CONFIG.siteName -->
  <link rel="stylesheet" href="frc-curriculum.css">
</head>
<body data-lesson="index"><!-- data-lesson tells JS this is the index page -->

<!-- banner text populated from SITE_CONFIG.banner; visibility controlled by body.wip CSS class -->
<div class="wip-banner"></div>

<!-- <header class="site-header"></header>  // site header isn't needed!--> 

<!-- h1 and p populated from SITE_CONFIG.siteName and SITE_CONFIG.siteSubtitle -->
<div class="course-hero">
  <h1></h1>
  <p></p>
</div>

<div class="module-grid">

  <!-- Each card populated by JS from SITE_CONFIG.lessons[data-lesson]:
       href, badge, title, description, hardware, duration -->
  <a class="module-card" data-lesson="01"><span class="card-badge"></span></a>
  <a class="module-card" data-lesson="02"><span class="card-badge"></span></a>
  <a class="module-card" data-lesson="03"><span class="card-badge"></span></a>
  <a class="module-card" data-lesson="04"><span class="card-badge"></span></a>
  <a class="module-card" data-lesson="05"><span class="card-badge"></span></a>
  <a class="module-card" data-lesson="06"><span class="card-badge"></span></a>
  <a class="module-card" data-lesson="07"><span class="card-badge"></span></a>

</div>

<footer class="site-footer"></footer>

<!-- site-config.js must load before frc-curriculum.js -->
<script src="js/site-config.js"></script>
<script src="js/frc-curriculum.js"></script>
</body>
</html>
